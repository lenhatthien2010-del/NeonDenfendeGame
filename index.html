    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Constants
        const ELEMENTS = [
            { id: 'fire', name: 'LỬA', rarity: 'Common', chance: 40, icon: '🔥', color: '#f87171' },
            { id: 'water', name: 'NƯỚC', rarity: 'Common', chance: 30, icon: '💧', color: '#60a5fa' },
            { id: 'earth', name: 'ĐẤT', rarity: 'Common', chance: 20, icon: '🌿', color: '#4ade80' },
            { id: 'wind', name: 'GIÓ', rarity: 'Rare', chance: 8, icon: '💨', color: '#94a3b8' },
            { id: 'lightning', name: 'SÉT', rarity: 'Rare', chance: 1.5, icon: '⚡', color: '#facc15' },
            { id: 'lava', name: 'DUNG NHAM', rarity: 'Epic', chance: 0.4, icon: '🌋', color: '#fb923c' },
            { id: 'void', name: 'HƯ KHÔNG', rarity: 'Legendary', chance: 0.08, icon: '🌀', color: '#a855f7' },
            { id: 'mythic-eye', name: 'MẮT THẦN', rarity: 'Mythic', chance: 0.01, icon: '👁️', color: '#ef4444' },
            { id: 'divine', name: 'THÁNH VẬT', rarity: 'Godly', chance: 0.001, icon: '👑', color: '#eab308' },
            { id: 'summer-sun', name: 'NẮNG HÈ', rarity: 'Summer', chance: 0.05, icon: '☀️', color: '#10b981' }
        ];

        // Game State
        let userData = {
            uid: '',
            rolls: 0,
            gems: 0,
            collection: [],
            wins: 0
        };

        let dealerShopData = {
            items: [],
            nextRestock: 0
        };

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'legacy-game';
        const isUsingFirebase = true;

        // UI Helpers
        window.switchScreen = (screenId) => {
            const screens = ['main-menu', 'game-screen', 'collection-screen', 'shop-screen'];
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            if (screenId === 'collection-screen') updateCollectionUI();
            if (screenId === 'shop-screen') updateShopUI();
        };

        function showNotif(msg, icon = 'ℹ️') {
            const container = document.getElementById('notif-container');
            const div = document.createElement('div');
            div.className = "bg-slate-900/90 backdrop-blur border border-white/10 p-3 px-5 rounded-2xl shadow-xl flex items-center gap-3 animate-bounce";
            div.innerHTML = `<span class="text-xl">${icon}</span><span class="font-bold text-sm">${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // Logic - Game Functions
        window.rollElement = async () => {
            if (userData.gems < 10 && userData.rolls > 0) {
                // First free rolls or check gems if we implement gem cost
            }

            const btn = document.getElementById('btn-roll');
            btn.disabled = true;
            btn.innerText = "ĐANG TÌM KIẾM...";

            // Simple roll logic
            let rand = Math.random() * 100;
            let cumm = 0;
            let result = ELEMENTS[0];

            for (let el of ELEMENTS) {
                cumm += el.chance;
                if (rand <= cumm) {
                    result = el;
                    break;
                }
            }

            // Update UI
            const resDisplay = document.getElementById('result-display');
            const resIcon = document.getElementById('result-icon');
            const resName = document.getElementById('result-name');
            const resRarity = document.getElementById('result-rarity');

            resDisplay.className = "w-full max-w-sm aspect-square rounded-[3rem] bg-slate-900 border-4 border-white/5 flex flex-col items-center justify-center relative overflow-hidden shadow-2xl roll-anim";
            
            if (result.rarity === 'Godly') resDisplay.classList.add('rarity-glow-godly');
            if (result.rarity === 'Summer') resDisplay.classList.add('summer-glow');

            resIcon.innerText = result.icon;
            resIcon.classList.remove('grayscale', 'opacity-20');
            resName.innerText = result.name;
            resName.style.color = result.color;
            resRarity.innerText = result.rarity;
            resRarity.style.color = result.color;

            // Update state
            userData.rolls++;
            userData.gems += 5; // Reward per roll
            if (!userData.collection.includes(result.id)) {
                userData.collection.push(result.id);
                showNotif(`MỚI: ${result.name}!`, '✨');
            }

            updateStats();
            saveData();
            
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "QUAY TIẾP";
            }, 800);
        };

        function updateStats() {
            document.getElementById('gem-count').innerText = `${userData.gems} 💎`;
            document.getElementById('shop-gems').innerText = userData.gems;
            document.getElementById('roll-count').innerText = userData.rolls;
            document.getElementById('stats-summary').innerText = `Lượt quay: ${userData.rolls} | Kim cương: ${userData.gems}`;
        }

        // Updated Collection UI with Rarity Borders for unowned items
        function updateCollectionUI() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';

            ELEMENTS.forEach(el => {
                const owned = userData.collection.includes(el.id);
                const item = document.createElement('div');
                
                // Get border class based on rarity
                let rarityBorderClass = '';
                switch(el.rarity) {
                    case 'Common': rarityBorderClass = 'border-common'; break;
                    case 'Rare': rarityBorderClass = 'border-rare'; break;
                    case 'Epic': rarityBorderClass = 'border-epic'; break;
                    case 'Legendary': rarityBorderClass = 'border-legendary'; break;
                    case 'Mythic': rarityBorderClass = 'border-mythic'; break;
                    case 'Godly': rarityBorderClass = 'border-godly'; break;
                    case 'Summer': rarityBorderClass = 'border-summer'; break;
                }

                item.className = `aspect-square bg-slate-900 rounded-2xl flex flex-col items-center justify-center border-2 ${owned ? 'border-white/20' : rarityBorderClass + ' opacity-60'} transition-all`;
                
                if (owned && el.rarity === 'Godly') item.classList.add('rarity-glow-godly');
                if (owned && el.rarity === 'Summer') item.classList.add('summer-glow');

                item.innerHTML = `
                    <div class="text-3xl mb-1 ${owned ? '' : 'grayscale'}">${el.icon}</div>
                    <div class="text-[8px] font-black uppercase text-center ${owned ? '' : 'text-slate-600'}">${el.name}</div>
                    <div class="text-[6px] font-bold opacity-50">${el.rarity}</div>
                `;
                grid.appendChild(item);
            });
        }

        // Shop Logic
        function generateDealerItems() {
            const pool = ELEMENTS.filter(e => e.rarity !== 'Common');
            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            dealerShopData.items = shuffled.slice(0, 3).map(item => ({
                id: item.id,
                price: Math.floor(200 + Math.random() * 800)
            }));
            dealerShopData.nextRestock = Date.now() + (30 * 60 * 1000); // 30 mins
            saveData();
        }

        function updateShopUI() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';

            dealerShopData.items.forEach(shopItem => {
                const el = ELEMENTS.find(e => e.id === shopItem.id);
                const owned = userData.collection.includes(el.id);
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-5 rounded-3xl flex items-center justify-between border border-white/5";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-4xl">${el.icon}</div>
                        <div>
                            <div class="font-black">${el.name}</div>
                            <div class="text-[10px] font-bold uppercase" style="color: ${el.color}">${el.rarity}</div>
                        </div>
                    </div>
                    <button onclick="buyFromShop('${el.id}', ${shopItem.price})" 
                        class="bg-emerald-600 px-6 py-3 rounded-2xl font-black text-sm ${owned || userData.gems < shopItem.price ? 'opacity-30' : 'active:scale-95'}"
                        ${owned || userData.gems < shopItem.price ? 'disabled' : ''}>
                        ${owned ? 'SỞ HỮU' : shopItem.price + ' 💎'}
                    </button>
                `;
                grid.appendChild(card);
            });

            updateShopTimer();
        }

        window.buyFromShop = (id, price) => {
            if (userData.gems >= price && !userData.collection.includes(id)) {
                userData.gems -= price;
                userData.collection.push(id);
                showNotif("MUA THÀNH CÔNG!", "🛍️");
                updateStats();
                updateShopUI();
                saveData();
            }
        };

        function updateShopTimer() {
            const timer = document.getElementById('shop-timer');
            const update = () => {
                const left = dealerShopData.nextRestock - Date.now();
                if (left <= 0) {
                    generateDealerItems();
                    updateShopUI();
                    return;
                }
                const mins = Math.floor(left / 60000);
                const secs = Math.floor((left % 60000) / 1000);
                timer.innerText = `Mới: ${mins}:${secs < 10 ? '0' + secs : secs}`;
            };
            update();
            setInterval(update, 1000);
        }

        // Firebase Operations
        async function saveData() {
            if (!userData.uid) return;
            try {
                const userRef = doc(db, 'artifacts', appId, 'users', userData.uid, 'profile', 'v1');
                await setDoc(userRef, {
                    ...userData,
                    dealerShopData, // Sync dealer shop too
                    updatedAt: Date.now()
                }, { merge: true });
            } catch (e) { console.error("Save error:", e); }
        }

        // Initialization
        const initGame = async () => {
            const bar = document.getElementById('loading-bar');
            let progress = 0;
            const int = setInterval(() => { 
                progress += 5; 
                bar.style.width = progress + "%";
                if(progress >= 100) clearInterval(int);
            }, 50);

            const setupUser = async (user) => {
                userData.uid = user.uid;
                
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'v1');
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    const cloudData = snap.data();
                    userData.rolls = cloudData.rolls || 0;
                    userData.gems = cloudData.gems || 0;
                    userData.collection = cloudData.collection || [];
                    userData.wins = cloudData.wins || 0;
                    if(cloudData.dealerShopData) dealerShopData = cloudData.dealerShopData;
                }

                if (!dealerShopData.nextRestock || Date.now() > dealerShopData.nextRestock) generateDealerItems();

                updateStats();
                document.getElementById('btn-roll').disabled = false;
                bar.style.width = "100%";
                
                setTimeout(() => { 
                    document.getElementById('loading-screen').classList.add('hidden'); 
                    document.getElementById('main-menu').classList.remove('hidden'); 
                    showNotif("CHÀO MỪNG ĐẾN VỚI DEV STUDIO GAME", "👋"); 
                }, 500);
            };

            if (isUsingFirebase) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, (u) => { 
                    if(u) setupUser(u); 
                });
            } else {
                setTimeout(() => {
                    let localUid = localStorage.getItem('legacy_local_uid');
                    if (!localUid) { 
                        localUid = 'LOCAL-' + Math.random().toString(36).substr(2, 9).toUpperCase(); 
                        localStorage.setItem('legacy_local_uid', localUid); 
                    }
                    setupUser({ uid: localUid });
                }, 1000);
            }
        };

        window.onload = initGame;
    </script>
</body>
</html>
